

services:

  consul:
    image: consul:1.15
    container_name: consul
    command: agent -server -bootstrap -ui -client=0.0.0.0
    ports:
      - "8500:8500"
      - "8600:8600/udp"

  service-a:
    build: ./service-a
    ports:
      - "3001:3001"
    depends_on:
      - consul

  service-b:
    build: ./service-b
    ports:
      - "3002:3002"
    depends_on:
      - consul

  service-c:
    build: ./service-c
    ports:
      - "3003:3003"
    depends_on:
      - consul

  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    depends_on:
      - consul
      
  prometheus:
    image: prom/prometheus
    container_name: prometheus

    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

    ports:
      - "9090:9090"
  
  grafana:
    image: grafana/grafana
    container_name: grafana

    ports:
      - "3000:3000"

    depends_on:
      - prometheus        
