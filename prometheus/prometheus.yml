global:
  scrape_interval: 5s

scrape_configs:

  - job_name: service-a
    static_configs:
      - targets:
          - service-a:3001

  - job_name: service-b
    static_configs:
      - targets:
          - service-b:3002

  - job_name: service-c
    static_configs:
      - targets:
          - service-c:3003

  - job_name: gateway
    static_configs:
      - targets:
          - gateway:8080

  - job_name: consul
    metrics_path: /v1/agent/metrics
    params:
      format: ['prometheus']
    static_configs:
      - targets:
          - consul:8500
